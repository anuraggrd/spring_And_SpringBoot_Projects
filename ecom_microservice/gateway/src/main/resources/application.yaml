spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: product
          uri: http://localhost:8082
          predicates:
            - Path=/api/product/**
        - id: user
          uri: http://localhost:8081
          predicates:
            - Path=/user/api/**
        - id: order
          uri: http://localhost:8083
          predicates:
            - Path=/api/cart/**,/api/order/**

server:
  port: 8080